<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing Codagenda | Akshat Network Hub</title>
    <style>
        :root { --bg: #0f172a; --accent: #10b981; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Initialization Phase */
        #init-layer { text-align: center; animation: fadeOut 0.5s 2.8s forwards; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1e293b; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        
        /* Modal Layer */
        #modal-layer { display: none; background: #1e293b; padding: 2rem; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

    <!-- 3 Second Initializing Phase -->
    <div id="init-layer">
        <div class="spinner"></div>
        <h2>System Initializing...</h2>
        <p>Preparing Codagenda environment</p>
    </div>

    <!-- 5 Second Redirect Modal Phase -->
    <div id="modal-layer">
        <h2>Redirecting to Codagenda</h2>
        <p>Establishing secure connection in <span id="timer">5</span>s...</p>
    </div>

    <script>
        const initLayer = document.getElementById('init-layer');
        const modalLayer = document.getElementById('modal-layer');
        const timerEl = document.getElementById('timer');
        
        // 1. After 3 seconds, show the Modal
        setTimeout(() => {
            initLayer.style.display = 'none';
            modalLayer.style.display = 'block';
            
            // 2. Start 5 second countdown
            let countdown = 5;
            const interval = setInterval(() => {
                countdown--;
                timerEl.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(interval);
                    window.location.href = "https://codagenda.akshatpsd2005.workers.dev/";
                }
            }, 1000);
        }, 3000);
    </script>
</body>
</html>
